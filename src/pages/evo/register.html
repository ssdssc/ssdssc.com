        }
        
        function positionNormal(overlay, boxClass) {
          var box = document.querySelector(boxClass);
          if (box) { overlay.style.display = 'block'; coverEl(overlay, box); }
          else overlay.style.display = 'none';
        }

        function positionAll() {
          positionNormal(schoolInput, '.framer-1ex2qu8');
          positionNormal(presidentInput, '.framer-rv89xf');
          positionPhone(presPhoneInput, '.framer-154epjs');
          
          positionNormal(micInput, '.framer-13yn0hl');
          positionPhone(micPhoneInput, '.framer-1m3k3hj');
          
          positionNormal(captainInput, '.framer-3ofee0');
          positionPhone(captainPhoneInput, '.framer-1sy7c8k');
          positionNormal(captainSubject, '.framer-14zqfq1');
          
          positionNormal(member1Input, '.framer-1e3yfw1');
          positionNormal(member1Subject, '.framer-pvhbo6');
          
          positionNormal(member2Input, '.framer-1q6y2w5');
          positionNormal(member2Subject, '.framer-2rx7vx');
          
          positionNormal(member3Input, '.framer-god0n1');
          positionNormal(member3Subject, '.framer-kqct6q');
          
          positionNormal(emailInput, '.framer-yys7yq');
          positionNormal(checkbox, '.framer-18u2wcn');
        }

        positionAll();

        window.addEventListener('scroll', positionAll, { passive: true });
        window.addEventListener('resize', positionAll, { passive: true });

        function wireSubmitButton() {
          var btnEl = document.querySelector('.framer-nx1ytg');
          if (!btnEl || btnEl._evoWired) return;
          btnEl._evoWired = true;
          btnEl.style.cursor = 'pointer';
          btnEl.style.pointerEvents = 'all';

          btnEl.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();

            var formEl = document.getElementById('evo-form-container');
            if (formEl && typeof formEl.reportValidity === 'function') {
              if (!formEl.reportValidity()) {
                return;
              }
            }

            var data = {
              schoolName: schoolInput.value.trim(),
              presidentName: presidentInput.value.trim(),
              presidentContact: presPhoneInput.value.trim(),
              micName: micInput.value.trim(),
              micContact: micPhoneInput.value.trim(),
              captainName: captainInput.value.trim(),
              captainContact: captainPhoneInput.value.trim(),
              captainSubject: captainSubject.value,
              member1Name: member1Input.value.trim(),
              member1Subject: member1Subject.value,
              member2Name: member2Input.value.trim(),
              member2Subject: member2Subject.value,
              member3Name: member3Input.value.trim(),
              member3Subject: member3Subject.value,
              emailAddress: emailInput.value.trim(),
              confirmation: checkbox.checked
            };

            /* Hide any previous message and restore helpline position */
            hideMessage();

            /* Swap button text to "Submitting..." */
            var btnTextSpan = btnEl.querySelector('span');
            var originalText = btnTextSpan ? btnTextSpan.textContent : null;
            if (btnTextSpan) btnTextSpan.textContent = 'Submitting...';
            btnEl.classList.add('evo-btn-loading');

            fetch('/api/evo/register', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(data),
            })
            .then(function(res) { return res.json(); })
            .then(function(resData) {
              btnEl.classList.remove('evo-btn-loading');
              /* Restore button text */
              if (btnTextSpan && originalText) btnTextSpan.textContent = originalText;

              if (resData.success) {
                showToast('Registration submitted successfully!', 'success');
                /* Clear the form */
                schoolInput.value = '';
                presidentInput.value = '';
                presPhoneInput.value = '';
                micInput.value = '';
                micPhoneInput.value = '';
                captainInput.value = '';
                captainPhoneInput.value = '';
                captainSubject.selectedIndex = 0;
                member1Input.value = '';
                member1Subject.selectedIndex = 0;
                member2Input.value = '';
                member2Subject.selectedIndex = 0;
                member3Input.value = '';
                member3Subject.selectedIndex = 0;
                emailInput.value = '';
                checkbox.checked = false;
                
                /* Trigger input change to reset visual placeholders */
                [schoolInput, presidentInput, micInput, captainInput, member1Input, member2Input, member3Input, emailInput, presPhoneInput, micPhoneInput, captainPhoneInput].forEach(function(el) {
                  el.dispatchEvent(new Event('input'));
                });
                [captainSubject, member1Subject, member2Subject, member3Subject].forEach(function(el) {
                  el.dispatchEvent(new Event('change'));
                });

              } else {
                showToast('Error: ' + (resData.error || 'Something went wrong.'), 'error');
              }
            })
            .catch(function() {
              btnEl.classList.remove('evo-btn-loading');
              /* Restore button text */
              if (btnTextSpan && originalText) btnTextSpan.textContent = originalText;
              showToast('Connection error submitting registration.', 'error');
            });
          });
        }

        function attachFooter() {
          var footer = document.querySelector('.framer-nsybx2-container');
          if (footer) {
            if (footer.parentElement !== document.body) {
              document.body.appendChild(footer);
            }
            footer.style.opacity = '1';
            footer.style.pointerEvents = 'auto';
          }
          var nav = document.querySelector('.framer-nav-container');
          if (nav) {
            nav.style.opacity = '1';
          }
          /* Restore canvas height to default (compacted to fit content) */
          var parent = document.querySelector('.framer-72rtr7') || document.querySelector('[data-framer-name="Form"]')?.parentElement;
          if (parent) {
            parent.style.setProperty('height', '2150px', 'important');
          }
        }

        function handleMutations() {
          wireSubmitButton();
          attachFooter();
        }

        handleMutations();
        var submitObserver = new MutationObserver(handleMutations);
        submitObserver.observe(document.getElementById('main'), { childList: true, subtree: true });
      }

      var observer = new MutationObserver(function(mutations) {
        if (document.querySelector('.framer-yys7yq') && document.querySelector('.framer-nx1ytg')) {
          observer.disconnect();
          setTimeout(buildForm, 120);
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });

      document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          if (document.querySelector('.framer-yys7yq')) {
            observer.disconnect();
            buildForm();
          }
        }, 500);
      });

    })();
    </script>

    <!-- ═══════════════════════════════════════════════════
         GRADUAL BLUR
    ════════════════════════════════════════════════════ -->
    <div id="gradual-blur-container" style="position: fixed; bottom: 0; left: 0; width: 100%; height: 6rem; z-index: 1000; pointer-events: none;"></div>
    <script>
      (function() {
        var container = document.getElementById('gradual-blur-container');
        var divCount = 5;
        var strength = 2;
        for (var i = 1; i <= divCount; i++) {
          var progress = i / divCount;
          var curveProgress = progress * progress; 
          var blurValue = Math.pow(2, curveProgress * 4) * 0.0625 * strength;
          var inc = 100 / divCount;
          var p1 = (i - 1) * inc;
          var p2 = i * inc;
          var p3 = (i + 1) * inc;
          var p4 = (i + 2) * inc;
          var grad = 'transparent ' + p1 + '%, black ' + p2 + '%';
          if (p3 <= 100) grad += ', black ' + p3 + '%';
          if (p4 <= 100) grad += ', transparent ' + p4 + '%';
          var div = document.createElement('div');
          div.style.position = 'absolute';
          div.style.top = '0'; div.style.left = '0'; div.style.right = '0'; div.style.bottom = '0';
          div.style.WebkitMaskImage = 'linear-gradient(to bottom, ' + grad + ')';
          div.style.maskImage = 'linear-gradient(to bottom, ' + grad + ')';
          div.style.backdropFilter = 'blur(' + blurValue.toFixed(3) + 'rem)';
          div.style.WebkitBackdropFilter = 'blur(' + blurValue.toFixed(3) + 'rem)';
          container.appendChild(div);
        }

        /* Fade out blur container when scrolling to the bottom of the page */
        window.addEventListener('scroll', function() {
          var threshold = 180; /* px from bottom */
          var scrollPosition = window.innerHeight + window.scrollY;
          var bodyHeight = document.documentElement.scrollHeight;
          if (bodyHeight - scrollPosition < threshold) {
            container.style.opacity = '0';
            container.style.transition = 'opacity 0.25s ease';
          } else {
            container.style.opacity = '1';
            container.style.transition = 'opacity 0.25s ease';
          }
        });
      })();
    </script>
    
    <!-- ═══════════════════════════════════════════════════
         SMOOTH SCROLL (Lenis)
    ════════════════════════════════════════════════════ -->
    <script src="https://unpkg.com/lenis@1.1.9/dist/lenis.min.js"></script>
    <script>
      (function() {
        var lenis = new Lenis({
          lerp: 0.05,
          wheelMultiplier: 0.8,
          direction: 'vertical',
          gestureDirection: 'vertical',
          smooth: true,
          smoothTouch: false,
          touchMultiplier: 2,
          infinite: false,
        });
        function raf(time) {
          lenis.raf(time);
          requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
      })();
    </script>

    <!-- ═══════════════════════════════════════════════════
         CUSTOM CURSOR FOLLOWER
    ════════════════════════════════════════════════════ -->
    <style>
      #evo-cursor {
        position: fixed;
        top: 0;
        left: 0;
        width: 14px;
        height: 14px;
        background-color: #ffffff;
        border-radius: 50%;
        pointer-events: none;
        z-index: 2147483647;
        transform: translate3d(-100px, -100px, 0);
        will-change: transform, opacity;
      }
    </style>
    <div id="evo-cursor"></div>
    <script>
      (function() {
        var cursor = document.getElementById('evo-cursor');
        var mouseX = -100, mouseY = -100;
        var cursorX = -100, cursorY = -100;
        window.addEventListener('mousemove', function(e) {
          mouseX = e.clientX;
          mouseY = e.clientY;
        });
        function loop() {
          cursorX += (mouseX - cursorX) * 0.05;
          cursorY += (mouseY - cursorY) * 0.05;
          cursor.style.transform = 'translate3d(' + (cursorX - 7) + 'px, ' + (cursorY - 7) + 'px, 0)';
          requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);

        var lastScrollY = window.scrollY;
        var navContainer = document.querySelector('.framer-nav-container');
        // Fade in navbar when script runs
        // (Moved inside attachFooter so it waits for React hydration)

        window.addEventListener('scroll', function() {
          if (window.scrollY > lastScrollY && window.scrollY > 50) {
            navContainer.classList.add('nav-hidden');
          } else {
            navContainer.classList.remove('nav-hidden');
          }
          lastScrollY = window.scrollY;
        });
      })();
    </script>
